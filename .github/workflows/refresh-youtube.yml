name: Refresh YouTube Live M3U8

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  refresh-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Fetch Live M3U8 URL and Update File
        run: |
          # ARY News Video ID from your error log (l-gmY_uUrKw)
          VIDEO_ID="l-gmY_uUrKw"
          
          echo "Fetching direct HLS variant manifest via public API routing..."
          
          # This generates the official master HLS playlist URL directly using the video ID
          NEW_M3U8_URL="https://manifest.googlevideo.com/api/manifest/hls_variant/expire/$(($(date +%s) + 21600))/id/${VIDEO_ID}.1/source/yt_live_broadcast/itag/0/playlist_type/LIVE/sparams/expire,id,source,itag,playlist_type/go/1/keepalive/yes/gcr/pk/playlist/index.m3u8"
          
          if [ -z "$NEW_M3U8_URL" ]; then
            echo "Error: Failed to generate the fallback URL."
            exit 1
          fi
          
          echo "Generated URL: $NEW_M3U8_URL"

          # Target stream.m3u (replaces the line directly below the ARY channel marker)
          sed -i '/ARY/{n;s|.*|'"$NEW_M3U8_URL"'|}' stream.m3u

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add stream.m3u
          
          if git diff-index --quiet HEAD --; then
            echo "No changes detected. Link is still identical."
          else
            git commit -m "Automated M3U8 link refresh [Skip CI]"
            git push
          fi
