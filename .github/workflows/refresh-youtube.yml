name: Refresh YouTube Live M3U8

on:
  schedule:
    # Runs every 6 hours (at minute 0 of hours 0, 6, 12, 18)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows you to manually trigger the workflow from the Actions tab

jobs:
  refresh-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push the updated playlist back to your repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      # Fixes the JavaScript runtime warning/error entirely
      - name: Set up Node.js (For yt-dlp JS Runtime)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (yt-dlp)
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          # Download the latest yt-dlp binary
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Fetch Live M3U8 URL and Update File
        run: |
          # The permanent, hardcoded channel ID endpoint for ARY News
          YOUTUBE_URL="https://www.youtube.com/channel/UCMmpLL2ucRHAXbNHiCPyIyg/live"
          
          echo "Fetching new M3U8 link with anti-bot bypass parameters..."
          
          # Added Node runtime flag, randomized browser user-agent, and fallback web/android client arguments to bypass bot checks
          NEW_M3U8_URL=$(yt-dlp \
            --js-runtimes "node" \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --extractor-args "youtube:player_client=web,android" \
            -g -f "best[ext=mp4]/best" "$YOUTUBE_URL" 2>/dev/null || \
            yt-dlp \
            --js-runtimes "node" \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --extractor-args "youtube:player_client=web,android" \
            -g "$YOUTUBE_URL")
          
          if [ -z "$NEW_M3U8_URL" ]; then
            echo "Error: Could not retrieve M3U8 URL from YouTube. Bot wall is still active."
            exit 1
          fi
          
          echo "Successfully retrieved new link."

          # Target stream.m3u (replaces the link line directly below the ARY channel marker)
          sed -i '/ARY/{n;s|.*|'"$NEW_M3U8_URL"'|}' stream.m3u

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add stream.m3u
          
          # Only commit if the file actually changed to avoid redundant commits
          if git diff-index --quiet HEAD --; then
            echo "No changes detected. Link is still identical."
          else
            git commit -m "Automated M3U8 link refresh [Skip CI]"
            git push
          fi
