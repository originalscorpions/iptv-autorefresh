name: Refresh YouTube Live M3U8

on:
  schedule:
    # Runs every 6 hours (at minute 0 of hours 0, 6, 12, 18)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows you to manually trigger the workflow from the Actions tab

jobs:
  refresh-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push the updated playlist back to your repo

    steps:
      # Upgraded to v6 for Node 24 native compatibility
      - name: Checkout Repository
        uses: actions/checkout@v6

      # Upgraded to v6 for Node 24 native compatibility
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies (yt-dlp)
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          # Download the latest yt-dlp binary
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Fetch Live M3U8 URL and Update File
        run: |
          # The specific YouTube Channel Live URL for ARY News
          YOUTUBE_URL="https://www.youtube.com/c/ARYNEWSOFFICIAL/live"
          
          echo "Fetching new M3U8 link..."
          # Fetch the best quality HLS/M3U8 URL using yt-dlp
          NEW_M3U8_URL=$(yt-dlp -g -f "best[ext=mp4]/best" "$YOUTUBE_URL" || yt-dlp -g "$YOUTUBE_URL")
          
          if [ -z "$NEW_M3U8_URL" ]; then
            echo "Error: Could not retrieve M3U8 URL from YouTube."
            exit 1
          fi
          
          echo "Successfully retrieved new link."

          # Target stream.m3u (based on your repo image)
          # Replaces the line directly below the ARY channel marker
          sed -i '/ARY/{n;s|.*|'"$NEW_M3U8_URL"'|}' stream.m3u

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add stream.m3u
          
          # Only commit if the file actually changed to avoid redundant commits
          if git diff-index --quiet HEAD --; then
            echo "No changes detected. Link is still identical."
          else
            git commit -m "Automated M3U8 link refresh [Skip CI]"
            git push
          fi
