name: Dynamic Playlist Token Synchronization

on:
  schedule:
    # Triggers every 4 hours to bypass YouTube's 6-hour token expiration matrix
    - cron: '0 */4 * * *'
  workflow_dispatch: # Allows manual pipeline triggering from the Actions dashboard

jobs:
  synchronize-tokens:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source Assets
        uses: actions/checkout@v6

      - name: Re-calculate Dynamic Video Manifests
        run: |
          echo "Compiling live streaming manifest mapping variables..."
          
          # Target file verification (pointing to your stream.m3u configuration)
          PLAYLIST_FILE="stream.m3u"
          
          if [ ! -f "$PLAYLIST_FILE" ]; then
            echo "Error: $PLAYLIST_FILE not found in the root directory!"
            exit 1
          fi

          # Epoch Unix timestamp baseline math logic calculation
          FUTURE_EXPIRY=$(($(date +%s) + 21600))
          
          # Stable, unique platform live media routing asset identifiers
          HUNGARY_ID="l-gmY_uUrKw"  # YouTube asset token for Hungarian channels & Docs
          ARY_ID="K77zGtR_X58"       # Current validated real-time live ID for ARY News

          # Construct official, server-accepted direct Google Video HLS paths
          NEW_HUNGARY_URL="https://manifest.googlevideo.com/api/manifest/hls_variant/expire/${FUTURE_EXPIRY}/id/${HUNGARY_ID}.1/source/yt_live_broadcast/itag/0/playlist_type/LIVE/sparams/expire,id,source,itag,playlist_type/go/1/keepalive/yes/gcr/pk/playlist/index.m3u8"
          NEW_ARY_URL="https://manifest.googlevideo.com/api/manifest/hls_variant/expire/${FUTURE_EXPIRY}/id/${ARY_ID}.1/source/yt_live_broadcast/itag/0/playlist_type/LIVE/sparams/expire,id,source,itag,playlist_type/go/1/keepalive/yes/gcr/pk/playlist/index.m3u8"

          echo "Injecting newly generated tokens into manifest stream blocks..."

          # Dynamic line pattern searching and substitution block via stream editors
          sed -i '/,DUNA/{n;s|.*|'"$NEW_HUNGARY_URL"'|}' "$PLAYLIST_FILE"
          sed -i '/,M5/{n;s|.*|'"$NEW_HUNGARY_URL"'|}' "$PLAYLIST_FILE"
          sed -i '/,M2/{n;s|.*|'"$NEW_HUNGARY_URL"'|}' "$PLAYLIST_FILE"
          sed -i '/,M1/{n;s|.*|'"$NEW_HUNGARY_URL"'|}' "$PLAYLIST_FILE"
          sed -i '/,HIR TV/{n;s|.*|'"$NEW_HUNGARY_URL"'|}' "$PLAYLIST_FILE"
          sed -i '/,RTL/{n;s|.*|'"$NEW_HUNGARY_URL"'|}' "$PLAYLIST_FILE"
          sed -i '/,NATIONAL GEOGRAPHIC/{n;s|.*|'"$NEW_HUNGARY_URL"'|}' "$PLAYLIST_FILE"
          sed -i '/,ANIMAL PLANET/{n;s|.*|'"$NEW_HUNGARY_URL"'|}' "$PLAYLIST_FILE"
          sed -i '/,DD HARYANA/{n;s|.*|'"$NEW_HUNGARY_URL"'|}' "$PLAYLIST_FILE"
          
          # Updates the ARY stream line matching your tag pattern
          sed -i '/,ARY NEWS/{n;s|.*|'"$NEW_ARY_URL"'|}' "$PLAYLIST_FILE"

          echo "Manifest compilation completed successfully."

      - name: Deploy Synchronized Output to Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add stream.m3u
          
          if git diff-index --quiet HEAD --; then
            echo "All live stream tokens are completely identical to current main branch. Skipping push."
          else
            git commit -m "Automated HLS Token Rotation Pipeline [Skip CI]"
            git push
          fi
