name: Refresh IPTV Tokens

on:
  schedule:
    - cron: '0 * * * *' # Executes automatically at the top of every hour
  workflow_dispatch: # Keeps the manual run button enabled

jobs:
  refresh-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install yt-dlp Core
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Run Token Fetcher Script
        run: python update_streams.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add stream.m3u
          git diff-index --quiet HEAD || git commit -m "Automated Playlist Token Refresh"
          git push
