name: Refresh IPTV Tokens

on:
  schedule:
    - cron: '0 */3 * * *' # Triggers automatically every 3 hours
  workflow_dispatch: # Allows you to trigger it manually via a button

jobs:
  refresh-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important: Gives the script rights to commit back to your repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-node-version: '3.10'

      - name: Run Token Fetcher Script
        run: python update_streams.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add stream.m3u
          git diff-index --quiet HEAD || git commit -m "Automated Playlist Token Refresh"
          git push
