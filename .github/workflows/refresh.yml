name: Auto-Refresh YouTube M3U

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write  # ✅ This grants write permission

jobs:
  refresh:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install yt-dlp
        run: pip install yt-dlp
      
      - name: Find and refresh YouTube URLs
        run: |
          python3 << 'EOF'
          import re
          import subprocess
          import sys
          
          try:
              with open('stream.m3u', 'r') as f:
                  content = f.read()
          except FileNotFoundError:
              print("stream.m3u not found!")
              sys.exit(1)
          
          # Find YouTube video IDs
          pattern = r'id/([a-zA-Z0-9_-]+)\.'
          video_ids = set(re.findall(pattern, content))
          
          if not video_ids:
              print("No YouTube video IDs found")
              sys.exit(0)
          
          print(f"Found YouTube IDs: {video_ids}")
          
          # Refresh each URL
          for vid in video_ids:
              print(f"Refreshing: {vid}")
              try:
                  result = subprocess.run(
                      ['yt-dlp', '-g', '-f', 'best', f'https://youtube.com/watch?v={vid}'],
                      capture_output=True,
                      text=True,
                      timeout=30
                  )
                  
                  if result.returncode == 0 and result.stdout:
                      new_url = result.stdout.strip().split('\n')[0]
                      print(f"  Got new URL for {vid}")
                      
                      # Replace old URL with new URL
                      lines = content.split('\n')
                      new_lines = []
                      
                      for line in lines:
                          if f'id/{vid}.' in line and ('http://' in line or 'https://' in line):
                              # This is the URL line - replace it
                              new_lines.append(new_url)
                              print(f"  Replaced URL for {vid}")
                          else:
                              new_lines.append(line)
                      
                      content = '\n'.join(new_lines)
                  else:
                      print(f"  Failed to refresh {vid}")
              except Exception as e:
                  print(f"  Error with {vid}: {e}")
              
          with open('stream.m3u', 'w') as f:
              f.write(content)
              
          print("Done! M3U file refreshed.")
          EOF
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stream.m3u
          git diff --staged --quiet || git commit -m "Auto-refresh YouTube URLs [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # ✅ This fixes the permission error
